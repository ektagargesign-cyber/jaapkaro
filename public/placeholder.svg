<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a1a"/>
      <stop offset="100%" stop-color="#f24a00"/>
    </linearGradient>

    <linearGradient id="phoneBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b3b3f"/>
      <stop offset="100%" stop-color="#17171a"/>
    </linearGradient>

    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6efe5"/>
      <stop offset="100%" stop-color="#efe4d4"/>
    </linearGradient>

    <linearGradient id="button" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a2a"/>
      <stop offset="100%" stop-color="#ff5a00"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="82" fill="url(#bg)"/>

  <!-- Mala -->
  <g fill="#d84a00">
    <circle cx="116" cy="210" r="17"/>
    <circle cx="128" cy="175" r="17"/>
    <circle cx="148" cy="145" r="17"/>
    <circle cx="176" cy="121" r="17"/>
    <circle cx="210" cy="106" r="17"/>
    <circle cx="248" cy="100" r="17"/>
    <circle cx="286" cy="103" r="17"/>
    <circle cx="323" cy="116" r="17"/>
    <circle cx="356" cy="138" r="17"/>
    <circle cx="382" cy="167" r="17"/>
    <circle cx="398" cy="202" r="17"/>
    <circle cx="404" cy="240" r="17"/>
    <circle cx="398" cy="278" r="17"/>
    <circle cx="382" cy="313" r="17"/>
    <circle cx="356" cy="342" r="17"/>
    <circle cx="323" cy="364" r="17"/>
    <circle cx="286" cy="377" r="17"/>
    <circle cx="248" cy="380" r="17"/>
    <circle cx="210" cy="374" r="17"/>
    <circle cx="176" cy="359" r="17"/>
    <circle cx="148" cy="335" r="17"/>
    <circle cx="128" cy="305" r="17"/>
    <circle cx="116" cy="270" r="17"/>
  </g>

  <!-- Phone -->
  <g filter="url(#shadow)">
    <rect x="160" y="88" width="192" height="330" rx="28" fill="url(#phoneBody)"/>
    <rect x="176" y="114" width="160" height="276" rx="16" fill="url(#screen)"/>
    <rect x="224" y="98" width="64" height="8" rx="4" fill="#222"/>
    <circle cx="256" cy="400" r="8" fill="#0f0f12"/>
  </g>

  <!-- 108 -->
  <text x="256" y="176" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="58" font-weight="700"
        fill="#4b3726">108</text>

  <line x1="198" y1="196" x2="314" y2="196"
        stroke="#c7b6a1" stroke-width="4" stroke-linecap="round"/>

  <!-- Jaap button -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="258" r="52" fill="#cf3e00"/>
    <circle cx="256" cy="252" r="52" fill="url(#button)"/>
    <circle cx="256" cy="252" r="34" fill="rgba(255,255,255,0.12)"/>
  </g>

  <!-- Minimal hand -->
  <g transform="translate(275 240) rotate(25)">
    <path d="M0 0
             C18 -8, 34 -2, 44 10
             L70 42
             C76 50, 74 62, 63 66
             C53 70, 44 66, 37 58
             L16 34
             C5 24, -8 14, 0 0 Z"
          fill="#ffd3a3"/>
  </g>

  <!-- Tassel -->
  <g transform="translate(256 380)">
    <circle cy="-6" r="14" fill="#ffbf1f"/>
    <rect x="-10" y="0" width="20" height="18" rx="5" fill="#f2a900"/>
    <path d="M-22 18 L22 18 L0 58 Z" fill="#f2a900"/>
    <path d="M-18 18 L-12 52 M-8 18 L-4 55 M0 18 L0 58 M8 18 L4 55 M18 18 L12 52"
          stroke="#d48a00" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>